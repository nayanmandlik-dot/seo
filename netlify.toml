[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API calls from the Netlify origin to the Render backend.
# This makes /api/* same-origin from the browser's point of view, so CORS
# is never an issue and the frontend bundle does not need to know the
# backend URL at build time.
[[redirects]]
  from   = "/api/*"
  to     = "https://seo-p307.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback: route every other path to index.html so React Router
# handles client-side routes on hard refresh / deep links.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

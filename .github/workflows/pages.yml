# Builds the React frontend and publishes it to GitHub Pages.
# Live URL: https://<owner>.github.io/<repo>/
#
# This is the UI-only demo build. The "Start Audit" feature will only work if
# you add a VITE_API_BASE repo secret pointing at a deployed backend
# (see DEPLOY.md for the Render setup).
#
# Setup (one-time):
#   1. Repo Settings → Pages → Source: "GitHub Actions"
#   2. (Optional) Settings → Secrets and variables → Actions → New repository
#      secret named VITE_API_BASE, value e.g. https://seo-audit-backend.onrender.com/api

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          # Vite reads these at build time. VITE_BASE_PATH must match the
          # repo name so assets resolve under /<repo>/.
          VITE_BASE_PATH: /seo/
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Add SPA 404 fallback
        # GitHub Pages serves 404.html for unknown routes. Copying index.html
        # to 404.html lets the React router handle deep links on refresh.
        run: cp dist/index.html dist/404.html

      - name: Add .nojekyll
        # Stops GitHub Pages' Jekyll processor from ignoring files starting
        # with an underscore (Vite outputs some).
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
